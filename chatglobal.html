<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Global</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #efeae2;
  font-family: Arial, sans-serif;
}

header {
  background: #1f2c33;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
}

.status { font-size: 12px; color: #ff4d4d; }

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  max-width: 70%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 10px;
  font-size: 14px;
  word-break: break-word;
}

.left { background: #fff; margin-right: auto; }
.right { background: #d9fdd3; margin-left: auto; }

.system {
  text-align: center;
  font-size: 12px;
  color: #666;
  margin: 10px 0;
}

.time {
  font-size: 10px;
  color: #888;
  display: block;
  text-align: right;
  margin-top: 4px;
}

.input {
  display: flex;
  padding: 10px;
  background: #1f2c33;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  background: #00a884;
  color: white;
}
</style>
</head>

<body>

<header>
  <div>Chat Global</div>
  <div id="status" class="status">Desconectado</div>
</header>

<div id="chat" class="chat"></div>

<div class="input">
  <input id="msg" disabled>
  <button id="send" disabled>Enviar</button>
</div>

<script>
const nome = prompt("Seu nome") || "Anônimo";

const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const send = document.getElementById("send");
const status = document.getElementById("status");

let ws;

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";

  const url = proto + "://3000-cs-884a8e36-ffdc-41c6-82ca-18f7b6b766ab.cs-us-east1-yeah.cloudshell.dev/ws?nome=" + encodeURIComponent(nome);

  ws = new WebSocket(url);

  ws.onopen = () => {
    status.textContent = "Conectado";
    status.style.color = "#25d366";
    msg.disabled = false;
    send.disabled = false;
  };

  ws.onclose = () => {
    status.textContent = "Reconectando...";
    status.style.color = "#ffcc00";
    msg.disabled = true;
    send.disabled = true;
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);

    const div = document.createElement("div");

    if (m.nome === "Sistema") {
      div.className = "system";
      div.textContent = m.texto + " (" + m.horario + ")";
    } else {
      const mine = m.nome === nome;
      div.className = "msg " + (mine ? "right" : "left");
      div.innerHTML = "<strong>" + m.nome + "</strong><br>" + m.texto + "<span class='time'>" + m.horario + "</span>";
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  };
}

send.onclick = () => {
  const text = msg.value.trim();
  if (!text || ws.readyState !== 1) return;
  ws.send(text);
  msg.value = "";
};

msg.addEventListener("keydown", e => {
  if (e.key === "Enter") send.onclick();
});

connect();
</script>

</body>
</html>
