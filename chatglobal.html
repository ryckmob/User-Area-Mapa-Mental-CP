<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Global</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #efeae2;
}

header {
  background: #1f2c33;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
}

.status {
  font-size: 12px;
  color: #ff4d4d;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  max-width: 70%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 10px;
  font-size: 14px;
  word-break: break-word;
}

.left { background: #fff; margin-right: auto; }
.right { background: #d9fdd3; margin-left: auto; }

.system {
  text-align: center;
  font-size: 12px;
  color: #666;
  margin: 10px 0;
}

.time {
  font-size: 10px;
  color: #888;
  display: block;
  text-align: right;
  margin-top: 4px;
}

.input {
  display: flex;
  padding: 10px;
  background: #1f2c33;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  background: #00a884;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<header>
  <div>Chat Global</div>
  <div id="status" class="status">Desconectado</div>
</header>

<div id="chat" class="chat"></div>

<div class="input">
  <input id="msg" placeholder="Mensagem..." disabled>
  <button id="send" disabled>Enviar</button>
</div>

<script>
let nome = prompt("Seu nome") || "Anônimo";

const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const send = document.getElementById("send");
const status = document.getElementById("status");

let ws;
let reconnecting = false;

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const url = `${proto}://3000-cs-884a8e36-ffdc-41c6-82ca-18f7b6b766ab.cs-us-east1-yeah.cloudshell.dev/ws?nome=${encodeURIComponent(nome)}`;

  ws = new WebSocket(url);

  ws.onopen = () => {
    status.textContent = "Conectado";
    status.style.color = "#25d366";

    msg.disabled = false;
    send.disabled = false;

    reconnecting = false;
  };

  ws.onclose = () => {
    status.textContent = "Reconectando...";
    status.style.color = "#ffcc00";

    msg.disabled = true;
    send.disabled = true;

    if (!reconnecting) {
      reconnecting = true;
      setTimeout(connect, 3000);
    }
  };

  ws.onerror = () => {
    try { ws.close(); } catch {}
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      addMsg(data);
    } catch (err) {
      console.log("Mensagem inválida:", e.data);
    }
  };
}

function addMsg(m) {
  const div = document.createElement("div");

  if (m.nome === "Sistema") {
    div.className = "system";
    div.textContent = `${m.texto} (${m.horario})`;
  } else {
    const mine = m.nome === nome;
    div.className = "msg " + (mine ? "right" : "left");

    div.innerHTML = `
      <strong>${m.nome}</strong><br>
      ${m.texto}
      <span class="time">${m.horario}</span>
    `;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function sendMsg() {
  const text = msg.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  ws.send(JSON.stringify(text));
  msg.value = "";
}

send.onclick = sendMsg;

msg.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMsg();
});

connect();
</script>

</body>
</html>
